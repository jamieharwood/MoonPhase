services:
  moonphase:
    image: jamieharwood/moonphase:latest
    container_name: moonphase-app
    restart: unless-stopped

    # Environment variables for configuration
    environment:
      - SPRING_APPLICATION_NAME=MoonPhase
      - MOON_PHASE_UPDATE_INTERVAL=3600000  # 1 hour in milliseconds
      - LOGGING_LEVEL_ROOT=INFO
      - TZ=UTC  # Set timezone (change as needed)
      - AWTRIXHOSTNAME=http://moonclock.bluelarma.com # Hostname for Awtrix
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}  # Claude API key for moon phase verification
      - SERVER_PORT=8081
      # MongoDB historical data
      - APP_HISTORY_ENABLED=true
      - SPRING_DATA_MONGODB_URI=mongodb://moonphase-mongo:27017/moonphase

    ports:
      - "8081:8081"

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Keep container running
    stdin_open: true
    tty: true

    depends_on:
      - mongodb

  mongodb:
    image: mongo:8
    container_name: moonphase-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  nginx:
    image: nginx:alpine
    container_name: moonphase-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - moonphase

  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot

volumes:
  mongo-data:
