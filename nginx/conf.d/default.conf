# HTTP — ACME challenges + redirect to HTTPS
server {
    listen 80;
    server_name home.bluelarma.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to Spring Boot
server {
    listen 443 ssl;
    server_name home.bluelarma.com;

    ssl_certificate     /etc/letsencrypt/live/home.bluelarma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/home.bluelarma.com/privkey.pem;

    location / {
        proxy_pass http://moonphase-app:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support — disable buffering so events stream immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
